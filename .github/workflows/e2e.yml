# E2E Tests (Reusable + Dispatchable)
#
# This workflow runs WebDriverIO tests against SauceLabs Real Device Cloud.
# Apps must already be uploaded to SauceLabs (see ship-to-saucelabs in main.yaml).
#
# Available suites (defined in e2e/configs/wdio.shared.conf.ts):
#   smoke           — basic launch + first navigation
#   happy-path      — onboarding → verify → main (straight-through)
#   full-regression — onboarding → verify → main (with detours)
#   migration       — v3 → v4 app upgrade flow (Sauce RDC only)
#
# Device matrix:
#   Callers pass a device_matrix JSON array of {platform, device, os_version}
#   objects. Each entry spawns a separate SauceLabs session.
#   Example: [{"platform":"iOS","device":"iPhone.*","os_version":"18"}]
#
# Trigger modes:
#   workflow_call  — called from main.yaml after builds (PR smoke tests)
#   workflow_dispatch — manual runs from the Actions UI
#
# Constraint: max-parallel=2 (SauceLabs concurrent-session limit).
name: E2E Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      suite:
        description: 'Test suite (smoke, happy-path, full-regression, migration)'
        type: string
        required: true
      build_number:
        description: 'Build number for SauceLabs artifact lookup'
        type: string
        required: true
      device_matrix:
        description: 'JSON array of {platform, device, os_version} objects'
        type: string
        required: true
    secrets:
      SAUCE_USERNAME:
        required: true
      SAUCE_ACCESS_KEY:
        required: true
      SM_USER:
        required: false
        description: 'SiteMinder username for in-person verification auto-approval (required for happy-path/full-regression/migration; omit for smoke)'
      SM_PASSWORD:
        required: false
        description: 'SiteMinder password for in-person verification auto-approval'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        type: choice
        options:
          - smoke
          - happy-path
          - full-regression
          - migration
        default: smoke
      build_number:
        description: 'Build number (run_number from the build workflow)'
        type: string
        required: true
      device_matrix:
        description: 'JSON array of {platform, device, os_version} objects'
        type: string
        default: '[{"platform":"iOS","device":"iPhone.*","os_version":""},{"platform":"Android","device":"Google.*","os_version":""}]'

jobs:
  # ─── E2E Tests ─────────────────────────────────────────────────────
  # Single unified job for all suites. Config file paths are selected at
  # runtime via a case statement on $SUITE:
  #   smoke / happy-path / full-regression → configs/sauce/wdio.{ios,android}.sauce.rdc.conf.ts
  #   migration                            → configs/sauce/wdio.{ios,android}.sauce.migration.conf.ts
  #
  # Non-blocking suites (migration): failures are reported but
  # do not gate the pipeline.
  e2e-tests:
    name: '${{ inputs.suite }} - ${{ matrix.device.platform }} ${{ matrix.device.os_version }}'
    runs-on: ubuntu-latest-m
    permissions:
      contents: read
    timeout-minutes: 45
    continue-on-error: ${{ inputs.suite == 'migration' }}
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        device: ${{ fromJSON(inputs.device_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Load variant config
        uses: ./.github/workflows/actions/load-variant-config
        with:
          variant: bcsc-dev

      - name: Setup NodeJS
        uses: ./.github/workflows/actions/setup-node

      - name: Cache E2E dependencies
        uses: actions/cache@v5
        with:
          path: |
            e2e/.yarn/cache
            e2e/node_modules
          key: e2e-deps-${{ hashFiles('e2e/yarn.lock') }}
          restore-keys: e2e-deps-

      - name: Install E2E dependencies
        working-directory: e2e
        run: yarn install --immutable

      - name: Run WDIO tests
        working-directory: e2e
        env:
          SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
          SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
          SM_USER: ${{ secrets.SM_USER }}
          SM_PASSWORD: ${{ secrets.SM_PASSWORD }}
          SAUCE_REGION: us
          VARIANT: bcsc-dev
          PLATFORM: ${{ matrix.device.platform }}
          IOS_DEVICE_NAME: ${{ matrix.device.platform == 'iOS' && matrix.device.device || '' }}
          IOS_PLATFORM_VERSION: ${{ matrix.device.platform == 'iOS' && matrix.device.os_version || '' }}
          ANDROID_DEVICE_NAME: ${{ matrix.device.platform == 'Android' && matrix.device.device || '' }}
          ANDROID_PLATFORM_VERSION: ${{ matrix.device.platform == 'Android' && matrix.device.os_version || '' }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          SUITE: ${{ inputs.suite }}
          BUILD_NAME: 'build-${{ inputs.build_number }}'
          TEST_NAME: 'E2E ${{ inputs.suite }} - ${{ matrix.device.platform }} ${{ matrix.device.os_version }}'
        run: |
          case "$SUITE" in
            migration)
              IOS_CONF="configs/sauce/wdio.ios.sauce.migration.conf.ts"
              ANDROID_CONF="configs/sauce/wdio.android.sauce.migration.conf.ts"
              ;;
            *)
              IOS_CONF="configs/sauce/wdio.ios.sauce.rdc.conf.ts"
              ANDROID_CONF="configs/sauce/wdio.android.sauce.rdc.conf.ts"
              ;;
          esac
          if [ "$PLATFORM" = "iOS" ]; then
            IOS_APP_FILENAME="${SAUCE_LABS_PREFIX}-${BUILD_NUMBER}.ipa" \
              yarn wdio "$IOS_CONF" --suite "${SUITE}"
          else
            ANDROID_APP_FILENAME="${SAUCE_LABS_PREFIX}-${BUILD_NUMBER}.apk" \
              yarn wdio "$ANDROID_CONF" --suite "${SUITE}"
          fi
