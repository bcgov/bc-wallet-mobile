name: Code Quality

on:
  push:
    branches: [main] # needed so codecov gets BASE coverage for comparison
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  merge_group:

jobs:
  typecheck-test:
    runs-on: macos-26
    name: Build, Typecheck, Test & Coverage
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: ./.github/workflows/actions/setup-node

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache bcsc-core build output
        uses: actions/cache@v5
        with:
          path: packages/bcsc-core/lib
          key: ${{ runner.os }}-bcsc-core-build-${{ hashFiles('packages/bcsc-core/src/**') }}
          restore-keys: |
            ${{ runner.os }}-bcsc-core-build-

      - name: Build packages
        run: yarn build

      - name: Typecheck
        run: yarn typecheck

      - name: Run tests and generate coverage report
        run: yarn coverage

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #V5 (v5.5.1) pinning for SonarQube
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        if: always()

  lint-format:
    runs-on: macos-26
    name: Lint & Format
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: ./.github/workflows/actions/setup-node

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install formatting and linting tools
        run: brew install swiftformat clang-format ktlint

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

  test-ios:
    runs-on: macos-26
    name: Native Tests (iOS)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Resolve iOS Simulator destination
        id: sim
        run: |
          SIM_NAME=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime in sorted(devices.keys(), reverse=True):
            if 'iOS' in runtime:
              for d in devices[runtime]:
                if 'iPhone' in d['name']:
                  print(d['name']); sys.exit(0)
          sys.exit(1)")
          echo "destination=platform=iOS Simulator,name=$SIM_NAME,OS=latest" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        working-directory: packages/bcsc-core
        run: |
          xcodebuild test \
            -scheme BcscCoreTests-Package \
            -destination '${{ steps.sim.outputs.destination }}' \
            -skipPackagePluginValidation

  test-android:
    runs-on: macos-26
    name: Native Tests (Android)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('packages/bcsc-core/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run Android tests
        working-directory: packages/bcsc-core/android
        run: ./gradlew test
