# E2E Nightly Full Regression
#
# Runs the full-regression E2E suite against the latest successful main
# build's SauceLabs artifacts.
#
# Default device matrix: 2 iOS + 2 Android OS versions (moderate coverage).
#
# Trigger modes:
#   schedule         — runs every night at midnight PT (7 AM UTC)
#   workflow_dispatch — manual trigger for ad-hoc regression runs
#
# Merge-gated: on schedule, the workflow first checks whether any commits
# landed on main in the last 24 hours. If nothing changed, it skips the
# run to avoid burning SauceLabs device time. Manual dispatches always run.
#
# The workflow resolves the latest successful main build number via the
# GitHub API (must have built within the last 24h), so no build_number
# input is needed. If commits landed but no main build succeeded in that
# window (i.e. main is red), the workflow fails rather than testing stale
# artifacts.
#
# NOTE: Nightly schedule is disabled until SauceLabs IPs are whitelisted.
# To re-enable, uncomment the schedule trigger below.
name: E2E Nightly

permissions:
  contents: read
  actions: read

on:
  schedule:
    - cron: '0 7 * * *' # Every day at 7 AM UTC (midnight PT)
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        type: choice
        options:
          - full-regression
          - happy-path
          - smoke
          - migration
        default: full-regression
      device_matrix:
        description: 'JSON array of {platform, device, os_version} objects'
        type: string
        default: '[{"platform":"iOS","device":"iPhone.*","os_version":"18"},{"platform":"iOS","device":"iPhone.*","os_version":"17"},{"platform":"Android","device":"Google.*","os_version":"15"},{"platform":"Android","device":"Google.*","os_version":"14"}]'

jobs:
  # ─── Gate: skip scheduled runs when nothing merged to main ──────
  check-for-merges:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check for commits on main in the last 24 hours
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — always run"
            exit 0
          fi

          SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
              || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(gh api \
            "repos/${{ github.repository }}/commits?sha=main&since=${SINCE}&per_page=1" \
            --jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Commits found on main since ${SINCE} — running regression"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No commits on main since ${SINCE} — skipping"
          fi

  resolve-build:
    needs: [check-for-merges]
    if: needs.check-for-merges.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    outputs:
      build_number: ${{ steps.find.outputs.build_number }}
    steps:
      - name: Find latest successful main build (within last 24h)
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
              || date -u -v-24H +%Y-%m-%dT%H:%M:%SZ)
          BUILD_NUMBER=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/main.yaml/runs?branch=main&status=success&created=>=${SINCE}&per_page=1" \
            --jq '.workflow_runs[0].run_number')
          if [ -z "$BUILD_NUMBER" ] || [ "$BUILD_NUMBER" = "null" ]; then
            echo "::error::No successful main build since ${SINCE} — main may be red, refusing to test stale artifacts"
            exit 1
          fi
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Latest successful main build since ${SINCE}: #${BUILD_NUMBER}"

  e2e:
    needs: [check-for-merges, resolve-build]
    if: needs.check-for-merges.outputs.should_run == 'true'
    uses: ./.github/workflows/e2e.yml
    with:
      suite: ${{ inputs.suite || 'full-regression' }}
      build_number: ${{ needs.resolve-build.outputs.build_number }}
      device_matrix: ${{ inputs.device_matrix || '[{"platform":"iOS","device":"iPhone.*","os_version":"18"},{"platform":"iOS","device":"iPhone.*","os_version":"17"},{"platform":"Android","device":"Google.*","os_version":"15"},{"platform":"Android","device":"Google.*","os_version":"14"}]' }}
    secrets:
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
