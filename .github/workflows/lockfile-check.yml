name: Lockfile Sync Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/lockfile-check.yml'
      - '**/package.json'
      - 'yarn.lock'
      - '**/build.gradle'
      - '**/settings.gradle'
      - '**/gradle.lockfile'
      - '**/Podfile'
      - '**/Podfile.lock'
  merge_group:

jobs:
  yarn-lock:
    runs-on: macos-26
    name: yarn.lock
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: ./.github/workflows/actions/setup-node

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Check yarn.lock is up to date
        run: yarn install --immutable

  gradle-lock:
    runs-on: macos-26
    name: gradle.lockfile
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: ./.github/workflows/actions/setup-node

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install JS dependencies
        run: yarn install --immutable

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('packages/bcsc-core/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Regenerate gradle lockfile
        working-directory: app/android
        run: ./gradlew app:dependencies --write-locks

      - name: Check gradle.lockfile is up to date
        run: |
          if ! git diff --exit-code app/android/app/gradle.lockfile; then
            echo "::error::gradle.lockfile is out of sync. Run './gradlew app:dependencies --write-locks' from app/android and commit the result."
            exit 1
          fi

  # Note: Sometimes `cocoapods` is installed per Ruby version via rbenv.
  # If `pod install` uses the wrong version, reinstall for the active Ruby:
  #
  # Example:
  #   rbenv shell 3.3.6
  #   gem uninstall cocoapods -v 1.16.2
  #   gem install cocoapods -v 1.14.3

  podfile-lock:
    runs-on: macos-26
    name: Podfile.lock
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - uses: ./.github/workflows/actions/setup-node

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Bundle install
        working-directory: app
        run: bundle install

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: app/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Regenerate Podfile.lock
        working-directory: app/ios
        run: bundle exec pod install

      - name: Check Podfile.lock is up to date
        run: |
          if ! git diff --exit-code app/ios/Podfile.lock; then
            echo "::error::Podfile.lock is out of sync. Run 'pod install' from app/ios and commit the result."
            exit 1
          fi
